name: CI

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

env:
  ZIG_VERSION: "0.15.0"

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v1
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Check formatting
        run: zig fmt --check src/ tests/ build.zig

      - name: Build (debug)
        run: zig build

      - name: Build (release)
        run: zig build -Doptimize=ReleaseSafe

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v1
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Run unit tests
        run: zig build test

      - name: Run integration tests
        run: zig build test-integration
        continue-on-error: true  # Some tests require root

  cross-compile:
    name: Cross Compile
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - x86_64-linux-gnu
          - x86_64-linux-musl
          - aarch64-linux-gnu
          - aarch64-linux-musl
    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v1
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Build for ${{ matrix.target }}
        run: zig build -Dtarget=${{ matrix.target }} -Doptimize=ReleaseSafe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zviz-${{ matrix.target }}
          path: zig-out/bin/zviz*

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for common issues
        run: |
          # Check for debug prints left in code
          if grep -r "std.debug.print" src/ --include="*.zig" | grep -v "test\|Test"; then
            echo "Warning: Found debug prints in non-test code"
          fi

          # Check for TODO comments (informational)
          echo "TODOs in codebase:"
          grep -rn "TODO" src/ --include="*.zig" || true

  release:
    name: Release Build
    runs-on: ubuntu-latest
    needs: [build, test, cross-compile]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v1
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Build all release targets
        run: zig build release

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: zviz-release
          path: zig-out/bin/zviz-*

  publish-release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [build, test, cross-compile]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v1
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Build all release targets
        run: zig build release

      - name: Prepare release artifacts
        run: |
          mkdir -p release
          cd zig-out/bin
          for f in zviz-*; do
            cp "$f" ../../release/
            sha256sum "$f" >> ../../release/checksums.sha256
          done

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ZViz v${{ steps.version.outputs.version }}
          draft: false
          prerelease: ${{ contains(github.ref, '-') }}
          generate_release_notes: true
          files: |
            release/zviz-*
            release/checksums.sha256
