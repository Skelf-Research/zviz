# ZViz Kubernetes RuntimeClass
#
# This RuntimeClass allows pods to opt-in to the ZViz sandbox runtime.
# Apply with: kubectl apply -f runtime-class.yaml
#
# Prerequisites:
# - ZViz binary installed at /usr/local/bin/zviz on all nodes
# - containerd configured with ZViz runtime (see deploy/containerd/config.toml)
# - containerd restarted after configuration change

---
apiVersion: node.k8s.io/v1
kind: RuntimeClass
metadata:
  name: zviz
  labels:
    app.kubernetes.io/name: zviz
    app.kubernetes.io/component: runtime
# The handler must match the runtime name in containerd config
# [plugins."io.containerd.grpc.v1.cri".containerd.runtimes.zviz]
handler: zviz

# Optional: Node scheduling constraints
# Uncomment to only schedule zviz pods on nodes with the runtime installed
# scheduling:
#   nodeSelector:
#     zviz.io/runtime: "true"

# Optional: Pod overhead for resource accounting
# This accounts for the additional resources used by the sandbox
# overhead:
#   podFixed:
#     memory: "32Mi"
#     cpu: "50m"

---
# Strict profile variant
apiVersion: node.k8s.io/v1
kind: RuntimeClass
metadata:
  name: zviz-strict
  labels:
    app.kubernetes.io/name: zviz
    app.kubernetes.io/component: runtime
    zviz.io/profile: strict
handler: zviz-strict
