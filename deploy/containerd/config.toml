# ZViz containerd runtime configuration
#
# Add this to your containerd config.toml to enable ZViz as a runtime option.
# The default location for containerd config is /etc/containerd/config.toml
#
# After adding this configuration, restart containerd:
#   systemctl restart containerd

# Runtime handler for ZViz
# This integrates with containerd's CRI plugin for Kubernetes support
[plugins."io.containerd.grpc.v1.cri".containerd.runtimes.zviz]
  # Use the standard runc v2 shim interface
  # ZViz is called as the runtime binary, not as a custom shim
  runtime_type = "io.containerd.runc.v2"

  # Don't allow privileged containers to bypass host device restrictions
  privileged_without_host_devices = false

  [plugins."io.containerd.grpc.v1.cri".containerd.runtimes.zviz.options]
    # Path to the ZViz binary
    BinaryName = "/usr/local/bin/zviz"

    # Optional: Specify the root directory for container state
    # Root = "/run/zviz"

    # Enable systemd cgroup driver (recommended for Kubernetes)
    SystemdCgroup = true

# Alternative: Runtime handler with specific profile
# Use this if you want different profiles for different workloads
[plugins."io.containerd.grpc.v1.cri".containerd.runtimes.zviz-strict]
  runtime_type = "io.containerd.runc.v2"
  privileged_without_host_devices = false

  [plugins."io.containerd.grpc.v1.cri".containerd.runtimes.zviz-strict.options]
    BinaryName = "/usr/local/bin/zviz"
    SystemdCgroup = true

    # Pod annotations can be used to select profiles
    # See deploy/kubernetes/pod-with-profile.yaml for usage
