# Web Application Deployment with ZViz
#
# This example deploys a web application with ZViz isolation.
# The web-server profile allows network binding and serving files
# while blocking file system writes and dangerous syscalls.
#
# Usage:
#   kubectl apply -f web-deployment.yaml
#   kubectl port-forward svc/web-app 8080:80

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-app
  labels:
    app: web-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: web-app
  template:
    metadata:
      labels:
        app: web-app
      annotations:
        zviz.io/profile: "web-server"
    spec:
      runtimeClassName: zviz

      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
          name: http

        resources:
          limits:
            memory: "128Mi"
            cpu: "200m"
          requests:
            memory: "64Mi"
            cpu: "100m"

        # Mount custom nginx config
        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/conf.d
          readOnly: true
        - name: static-content
          mountPath: /usr/share/nginx/html
          readOnly: true
        - name: cache
          mountPath: /var/cache/nginx
        - name: run
          mountPath: /var/run

        securityContext:
          runAsNonRoot: true
          runAsUser: 101  # nginx user
          runAsGroup: 101
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL
            add:
              - NET_BIND_SERVICE  # Only if binding to port < 1024

        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10

        readinessProbe:
          httpGet:
            path: /ready
            port: 80
          initialDelaySeconds: 2
          periodSeconds: 5

      volumes:
      - name: nginx-config
        configMap:
          name: nginx-config
      - name: static-content
        configMap:
          name: static-content
      - name: cache
        emptyDir: {}
      - name: run
        emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: web-app
  labels:
    app: web-app
spec:
  selector:
    app: web-app
  ports:
  - port: 80
    targetPort: 80
    name: http
  type: ClusterIP

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
data:
  default.conf: |
    server {
        listen 80;
        server_name _;

        location /health {
            return 200 'ok';
            add_header Content-Type text/plain;
        }

        location /ready {
            return 200 'ready';
            add_header Content-Type text/plain;
        }

        location / {
            root /usr/share/nginx/html;
            index index.html;
        }
    }

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: static-content
data:
  index.html: |
    <!DOCTYPE html>
    <html>
    <head><title>ZViz Secured App</title></head>
    <body>
      <h1>Hello from ZViz!</h1>
      <p>This application is running in a ZViz-isolated container.</p>
    </body>
    </html>

---
# HorizontalPodAutoscaler for the web app
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: web-app
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: web-app
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
