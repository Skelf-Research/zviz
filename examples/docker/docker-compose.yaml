# Docker Compose with ZigViz Runtime
#
# This example shows how to use ZigViz with Docker Compose.
# Each service can specify the zigviz runtime for isolation.
#
# Prerequisites:
#   1. Install ZigViz: sudo ./deploy/install.sh
#   2. Configure Docker: Add zigviz runtime to /etc/docker/daemon.json
#   3. Restart Docker: sudo systemctl restart docker
#
# Usage:
#   docker-compose up -d
#   docker-compose logs -f
#   docker-compose down

version: "3.8"

services:
  # Web application with ZigViz isolation
  web:
    image: nginx:alpine
    runtime: zigviz
    ports:
      - "8080:80"
    volumes:
      - ./html:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    labels:
      zigviz.profile: "web-server"
      zigviz.audit: "true"
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # API backend with ZigViz isolation
  api:
    image: node:20-alpine
    runtime: zigviz
    working_dir: /app
    command: ["node", "server.js"]
    volumes:
      - ./api:/app:ro
    environment:
      - NODE_ENV=production
      - PORT=3000
    labels:
      zigviz.profile: "web-server"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "1.0"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Database (NOT using ZigViz - databases need direct syscall access)
  db:
    image: postgres:15-alpine
    # Note: Databases typically need direct syscall access
    # runtime: zigviz  # Uncomment only if you have a database profile
    environment:
      - POSTGRES_USER=app
      - POSTGRES_PASSWORD=secret
      - POSTGRES_DB=appdb
    volumes:
      - db_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d appdb"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Redis cache with ZigViz
  redis:
    image: redis:7-alpine
    runtime: zigviz
    command: ["redis-server", "--maxmemory", "64mb", "--maxmemory-policy", "allkeys-lru"]
    labels:
      zigviz.profile: "minimal"
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # CI runner example - ephemeral build container
  ci-runner:
    image: node:20-alpine
    runtime: zigviz
    working_dir: /workspace
    command: ["sh", "-c", "npm ci && npm test && npm run build"]
    volumes:
      - ./project:/workspace
      - npm_cache:/root/.npm
    environment:
      - CI=true
      - NODE_ENV=test
    labels:
      zigviz.profile: "ci-runner"
      zigviz.audit: "true"
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2.0"
    profiles:
      - ci  # Only run with: docker-compose --profile ci up ci-runner

volumes:
  db_data:
  npm_cache:

networks:
  default:
    driver: bridge
